version: "3.9"

# ============================================================
# Cybersecurity Threat Detection - Lambda Architecture Stack
# Hadoop + Kafka + Cassandra + InfluxDB + Grafana
# ============================================================

services:

  # ─── HADOOP NAMENODE ──────────────────────────────────────
  hadoop-master:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-master
    hostname: hadoop-master
    tty: true
    stdin_open: true
    ports:
      - "9870:9870"
      - "9000:9000"
      - "8088:8088"
    environment:
      - CLUSTER_NAME=cybersecurity-cluster
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./scripts:/scripts
    networks:
      - cybernetwork

  # ─── HADOOP WORKERS ───────────────────────────────────────
  hadoop-worker1:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker1
    hostname: hadoop-worker1
    tty: true
    stdin_open: true
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    depends_on:
      - hadoop-master
    networks:
      - cybernetwork

  hadoop-worker2:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker2
    hostname: hadoop-worker2
    tty: true
    stdin_open: true
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    depends_on:
      - hadoop-master
    networks:
      - cybernetwork

  # ─── ZOOKEEPER ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2182:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - cybernetwork

  # ─── KAFKA ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cybernetwork

  # ─── CASSANDRA ────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: sitcn-cluster
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - cybernetwork

  # ─── INFLUXDB ─────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    hostname: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=cyber-org
      - DOCKER_INFLUXDB_INIT_BUCKET=cyber-bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=super-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - cybernetwork

  # ─── GRAFANA ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - cybernetwork
  hbase:
    image: dajobe/hbase:latest
    container_name: hbase
    hostname: hbase
    ports:
      - "16000:16000"   # HBase Master
      - "16010:16010"   # HBase Web UI
      - "16020:16020"   # HBase RegionServer
      - "16030:16030"   # RegionServer Web UI
      - "2183:2181"     # HBase-internal ZooKeeper (avoid collision with Kafka ZK)
    environment:
      HBASE_DOCKER_HOSTNAME: hbase
    volumes:
      - hbase_data:/data/hbase
    networks:
      - cybernetwork
# ============================================================
# VOLUMES
# ============================================================
volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  cassandra_data:
  influxdb_data:
  grafana_data:
  hbase_data:
# ============================================================
# NETWORK
# ============================================================
networks:
  cybernetwork:
    driver: bridge