# ============================================================
# Cybersecurity Threat Detection - Lambda Architecture Stack
# Services: Hadoop (3 nodes) + HBase + Zookeeper + Kafka + Spark + Cassandra
# ============================================================

services:

  # ─── HADOOP NAMENODE ──────────────────────────────────────
  hadoop-master:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-master
    hostname: hadoop-master
    tty: true
    stdin_open: true
    ports:
      - "9870:9870"   # HDFS Web UI
      - "9000:9000"   # HDFS NameNode
      - "8088:8088"   # YARN ResourceManager UI
    environment:
      - CLUSTER_NAME=cybersecurity-cluster
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./scripts:/scripts
    networks:
      - cybernetwork

  # ─── HADOOP DATANODE 1 ────────────────────────────────────
  hadoop-worker1:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker1
    hostname: hadoop-worker1
    tty: true
    stdin_open: true
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    depends_on:
      - hadoop-master
    networks:
      - cybernetwork

  # ─── HADOOP DATANODE 2 ────────────────────────────────────
  hadoop-worker2:
    image: liliasfaxi/hadoop-cluster:latest
    container_name: hadoop-worker2
    hostname: hadoop-worker2
    tty: true
    stdin_open: true
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-master:9000
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    depends_on:
      - hadoop-master
    networks:
      - cybernetwork

  # ─── HBASE MASTER ─────────────────────────────────────────
  hbase:
    image: dajobe/hbase:latest
    container_name: hbase
    hostname: hbase
    ports:
      - "16000:16000"   # HBase Master
      - "16010:16010"   # HBase Web UI
      - "16020:16020"   # HBase RegionServer
      - "16030:16030"   # RegionServer Web UI
      - "2183:2181"     # HBase-internal ZooKeeper (avoid collision with Kafka ZK)
    environment:
      HBASE_DOCKER_HOSTNAME: hbase
    volumes:
      - hbase_data:/data/hbase
    networks:
      - cybernetwork

  # ─── ZOOKEEPER (For Kafka) ────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2182:2181"   # Host:2182 باش ما يتصادمش مع HBase Zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybernetwork

  # ─── KAFKA ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"     # Host access
      - "29092:29092"   # Internal access (Spark)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - cybernetwork

  
# ============================================================
# VOLUMES
# ============================================================
volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hbase_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

# ============================================================
# NETWORK
# ============================================================
networks:
  cybernetwork:
    driver: bridge
